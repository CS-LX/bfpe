name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bfpe.exe
        shell: pwsh
        run: |
          cmake -S . -B build-native -G "Visual Studio 17 2022" -A x64
          cmake --build build-native --config Release
          ctest --test-dir build-native -C Release --output-on-failure
          $exe = @(
            "build-native/bin/bfpe.exe",
            "build-native/bin/Release/bfpe.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            $exe = (Get-ChildItem build-native -Recurse -Filter bfpe.exe | Select-Object -First 1).FullName
          }
          if (-not $exe) { throw "bfpe.exe not found after build" }
          "BFPE_EXE=$exe" >> $env:GITHUB_ENV

      - name: Smoke test
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          & $env:BFPE_EXE build examples/add.bf -o build/add.dll
          $out = & $env:BFPE_EXE exec examples/add.bf 3 5
          if ($out -ne "8") { throw "exec add: expected 8, got $out" }

      - name: Pack portable zip
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools/pack_portable.ps1 -BfpeExe $env:BFPE_EXE
          Copy-Item $env:BFPE_EXE dist/bfpe.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bfpe.exe
            dist/bfpe-portable.zip
          generate_release_notes: true
