name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build bfpe.exe and run codegen tests
        shell: pwsh
        run: |
          cmake -S . -B build-native -G "Visual Studio 17 2022" -A x64
          cmake --build build-native --config Release
          ctest --test-dir build-native -C Release --output-on-failure

      - name: Build and verify multi-export DLL
        shell: pwsh
        run: |
          .\build-native\bin\bfpe.exe build examples/add.bf examples/hello_world.bf -o build/bfpe_lib.dll

      - name: exec, run, and EXE smoke test
        shell: pwsh
        run: |
          $out = .\build-native\bin\bfpe.exe exec examples/add.bf 3 5
          if ($out -ne "8") { throw "exec add: expected 8, got $out" }
          $out = .\build-native\bin\bfpe.exe run build/bfpe_lib.dll Add 3 5
          if ($out -ne "8") { throw "run Add: expected 8, got $out" }
          .\build-native\bin\bfpe.exe build examples/hello.bf -o build/hello.exe
          $out = .\build\hello.exe
          if ($out -ne "Hi") { throw "hello.exe: expected Hi, got $out" }
