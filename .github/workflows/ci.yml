name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build bfpe.exe and run codegen tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S . -B build-native -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-native
          ctest --test-dir build-native --output-on-failure
          $exe = @(
            "build-native/bin/bfpe.exe",
            "build-native/bin/Release/bfpe.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            $exe = (Get-ChildItem build-native -Recurse -Filter bfpe.exe | Select-Object -First 1).FullName
          }
          if (-not $exe) { throw "bfpe.exe not found after build" }
          "BFPE_EXE=$exe" >> $env:GITHUB_ENV

      - name: Build and verify multi-export DLL
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          & $env:BFPE_EXE build examples/add.bf examples/hello_world.bf -o build/bfpe_lib.dll

      - name: exec, run, and EXE smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = & $env:BFPE_EXE exec examples/add.bf 3 5
          if ($out -ne "8") { throw "exec add: expected 8, got $out" }
          $out = & $env:BFPE_EXE run build/bfpe_lib.dll Add 3 5
          if ($out -ne "8") { throw "run Add: expected 8, got $out" }
          & $env:BFPE_EXE build examples/hello.bf -o build/hello.exe
          $out = & .\build\hello.exe
          if ($out -ne "Hi") { throw "hello.exe: expected Hi, got $out" }
